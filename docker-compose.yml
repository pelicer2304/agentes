# Docker Compose for the DecodificaIA WhatsApp + Evolution production stack.
#
# Services:
#   - postgres      : PostgreSQL 16. Hosts two databases on one instance:
#                     `decodifica` (app, Prisma) and `evolution` (gateway).
#                     Named volume + pg_isready healthcheck.
#   - redis         : Shared cache/queue used by the Evolution API (and available
#                     to the app for rate limiting). appendonly + ping healthcheck.
#   - evolution-api : WhatsApp gateway (evoapicloud/evolution-api). Persists to
#                     the `evolution` database + Redis. Its GLOBAL webhook points
#                     at the app's POST /webhooks/evolution endpoint.
#   - api           : NestJS API. Runs `prisma migrate deploy` on start, then
#                     boots. Talks to Evolution over the internal network at
#                     http://evolution-api:8080. Listens on 3001.
#   - web           : Built React (Vite) frontend served as static files on 3000.
#
# EasyPanel manages public domains/ports per service, so container ports are NOT
# published here. Each public-facing service (web, api, evolution-api) gets its
# own EasyPanel domain. See DEPLOYMENT.md and .env.example.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-decodifica}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the separate `evolution` database on first init.
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    environment:
      # --- Server ---
      SERVER_TYPE: http
      SERVER_PORT: 8080
      # Public URL of THIS Evolution service (its own EasyPanel domain).
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      # --- Database (own `evolution` database on the shared postgres) ---
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # --- Redis ---
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"

      # --- Authentication (same key the app uses to call Evolution) ---
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # --- QR Code ---
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#198754"

      # --- Global webhook -> the app's inbound endpoint (internal network) ---
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://api:3001/webhooks/evolution"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"

      LOG_LEVEL: "ERROR,WARN,INFO"
      LOG_COLOR: "true"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    # The api Dockerfile CMD runs `prisma migrate deploy` then starts the app.
    environment:
      # --- Database (app DB on the bundled postgres service) ---
      # Built from POSTGRES_* and pinned to the `postgres` service host so a
      # stray DATABASE_URL pointing at localhost can't break the container.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-decodifica}?schema=public

      # --- Runtime environment ---
      APP_ENV: ${APP_ENV:-production}
      # Defaults let the API boot even before these are set in EasyPanel.
      # OVERRIDE in EasyPanel: FRONTEND_URL (web domain), PUBLIC_API_URL (api
      # domain), and especially JWT_SECRET (use a strong random value).
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}

      # --- Auth ---
      JWT_SECRET: ${JWT_SECRET:-change-me-please-set-a-strong-jwt-secret-32+}

      # --- LLM provider configuration ---
      # The engine uses OpenAIProviderService for both providers, reading
      # OPENAI_API_KEY / OPENAI_BASE_URL (OPENROUTER_* accepted as aliases).
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK:-google/gemini-2.5-flash}

      # --- Evolution API (internal service URL on the compose network) ---
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-decodifica}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}

      # --- Bot behavior toggles ---
      BOT_AUTO_REPLY_ENABLED: ${BOT_AUTO_REPLY_ENABLED:-true}
      BOT_PAUSE_ON_HANDOFF: ${BOT_PAUSE_ON_HANDOFF:-true}
      ADMIN_WHATSAPP_NUMBERS: ${ADMIN_WHATSAPP_NUMBERS:-}

      # --- Pricing configuration ---
      PRICING_RANGE_ENABLED: ${PRICING_RANGE_ENABLED:-true}
      PRICING_STARTING_AT: ${PRICING_STARTING_AT:-2500}
      PRICING_TEXT: ${PRICING_TEXT:-}

      # --- Optional shared cache (app rate limiter can use Redis when present) ---
      REDIS_URL: redis://redis:6379
    # Ports are managed by EasyPanel via Domains (api container listens on 3001).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Ports are managed by EasyPanel via Domains (web container listens on 3000).

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evolution_instances:
    driver: local
  evolution_store:
    driver: local
